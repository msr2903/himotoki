name: CI

on:
  push:
    branches: [main, "cursor/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Pytest
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package (dev)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Optional dictionary DB
        env:
          HIMOTOKI_CI_DB_URL: ${{ secrets.HIMOTOKI_CI_DB_URL }}
        run: |
          # Full dictionary (~1.8GB) is gitignored. Optionally download from a
          # private URL configured as repo secret HIMOTOKI_CI_DB_URL so score
          # equivalence and DB-backed tests run in CI.
          if [ -n "${HIMOTOKI_CI_DB_URL:-}" ]; then
            mkdir -p data
            echo "Downloading dictionary DB for CI..."
            curl -L --fail --retry 3 -o data/himotoki.db "$HIMOTOKI_CI_DB_URL"
            ls -lh data/himotoki.db
          else
            echo "No HIMOTOKI_CI_DB_URL secret; DB-backed tests will skip."
          fi

      - name: Run tests
        env:
          HIMOTOKI_DB_PATH: ${{ github.workspace }}/data/himotoki.db
        run: |
          pytest tests/ -q --tb=short
